                type: integer
              arrivalReachableDistance:
                type: integer
              energyConsumptionOnLeg:
                type: [number, "null"]
              batteryEmptyToDestinationDistance:
                type: [number, "null"]
              batteryEmptyLocationLatitude:
                type: [number, "null"]
              batteryEmptyLocationLongitude:
                type: [number, "null"]
              waypoints:
                type: array
                items:
                  type: object
                  properties:
                    waypointType:
                      type: string
                      enum: [DC_CHARGE_STATION, OTHER]
                    entityId:
                      type: string
                    name:
                      type: [string, "null"]
                    latitude:
                      type: number
                    longitude:
                      type: number
                    maxPower:
                      type: [integer, "null"]
                    chargeDuration:
                      type: integer
                    arrivalSOC:
                      type: integer
                    arrivalReachableDistance:
                      type: integer
                    departureSOC:
                      type: integer
                    departureReachableDistance:
                      type: integer
                    adapterRequired:
                      type: [boolean, "null"]
        tripPlanStatus:
          type: string
        chargeStationsAvailable:
          type: boolean
        socBelowLimit:
          type: boolean

    PlaceResult:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        distance:
          type: number
        location:
          type: object
          properties:
            addressComponents:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  shortName:
                    type: string
                  longName:
                    type: string
            coordinate:
              type: object
              properties:
                latitude:
                  type: number
                longitude:
                  type: number
            navCoordinate:
              type: object
              properties:
                latitude:
                  type: number
                longitude:
                  type: number
            formattedAddress:
              type: string
        driveDetails:
          type: object
          properties:
            driveDistance:
              type: number
            driveDuration:
              type: number
            detourDistance:
              type: number
            detourDuration:
              type: number

    VehicleMobileImage:
      type: object
      properties:
        __typename:
          type: string
        vehicleId:
          type: string
        orderId:
          type: string
        url:
          type: string
          format: uri
        resolution:
          type: string
        size:
          type: string
          enum: [small, large]
        design:
          type: string
          enum: [dark, light]
        placement:
          type: string
          enum: [front, rear, side, side-charging, overhead]
        overlays:
          type: [array, "null"]
          items:
            type: object
            properties:
              url:
                type: string
              overlay:
                type: string
              zIndex:
                type: integer

paths:
  # ── Authentication ──────────────────────────────────────────
  /gateway/graphql#CreateCSRFToken:
    post:
      tags: [Authentication]
      operationId: createCSRFToken
      summary: Create a CSRF token
      description: Generates a CSRF token and app session token required for all subsequent requests.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                operationName:
                  type: string
                  example: CreateCSRFToken
                variables:
                  type: array
                  example: []
                query:
                  type: string
                  example: "mutation CreateCSRFToken { createCsrfToken { __typename csrfToken appSessionToken } }"
      responses:
        "200":
          description: CSRF token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCSRFTokenResponse"

  /gateway/graphql#Login:
    post:
      tags: [Authentication]
      operationId: login
      summary: Login with email and password
      description: |
        Authenticates with email and password. Returns either an access token (non-MFA)
        or an OTP token (MFA required). Requires `apollographql-client-name` header.
      parameters:
        - name: a-sess
          in: header
          required: true
          schema:
            type: string
        - name: csrf-token
          in: header
          required: true
          schema:
            type: string
        - name: apollographql-client-name
          in: header
          required: true
          schema:
            type: string
            example: com.rivian.android.consumer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                operationName:
                  type: string
                  example: Login
                variables:
                  type: object
                  properties:
                    email:
                      type: string
                    password:
                      type: string
                query:
                  type: string
                  example: "mutation Login($email: String!, $password: String!) { login(email: $email, password: $password) { __typename ... on MobileLoginResponse { accessToken refreshToken userSessionToken } ... on MobileMFALoginResponse { otpToken } } }"
      responses:
        "200":
          description: Login successful or MFA required
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LoginResponse"
                  - $ref: "#/components/schemas/MFALoginResponse"

  /gateway/graphql#LoginWithOTP:
    post:
      tags: [Authentication]
      operationId: loginWithOTP
      summary: Login with OTP (MFA)
      description: Completes MFA login using the OTP code and token from the initial login response.
      parameters:
        - name: a-sess
          in: header
          required: true
          schema:
            type: string
        - name: csrf-token
          in: header
          required: true
          schema:
            type: string
        - name: apollographql-client-name
          in: header
          required: true
          schema:
            type: string
            example: com.rivian.android.consumer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                operationName:
                  type: string
                  example: LoginWithOTP
                variables:
                  type: object
                  properties:
                    email:
                      type: string
                    otpCode:
                      type: string
                    otpToken:
                      type: string
                query:
                  type: string
                  example: "mutation LoginWithOTP($email: String!, $otpCode: String!, $otpToken: String!) { loginWithOTP(email: $email, otpCode: $otpCode, otpToken: $otpToken) { __typename accessToken refreshToken userSessionToken } }"
      responses:
        "200":
          description: MFA login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  # ── Account Endpoints ───────────────────────────────────────
  /gateway/graphql#getUserInfo:
    post:
      tags: [Account]
      operationId: getUserInfo
      summary: Get user account information
      description: Returns user info including vehicles, enrolled phones, and pending invites.
      security:
        - sessionAuth: []
          userSessionAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                operationName:
                  type: string
                  example: getUserInfo
                variables:
                  type: object
                query:
                  type: string
      responses:
        "200":
          description: User info retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      currentUser:
                        $ref: "#/components/schemas/UserInfo"

  /gateway/graphql#CurrentUserForLogin:
    post:
      tags: [Account]
      operationId: currentUserForLogin
      summary: Get current user configuration
      description: Returns detailed vehicle configuration, maintenance schedule, and user settings.
      security:
        - sessionAuth: []
          userSessionAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GraphQLRequest"
      responses:
        "200":
          description: Current user details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      currentUser:
                        $ref: "#/components/schemas/UserInfo"

  /gateway/graphql#vehicleOrders:
    post:
      tags: [Account]
      operationId: vehicleOrders
      summary: List vehicle orders
      description: Returns a list of vehicle orders (pre-orders and vehicle orders) for your account.
      security:
