  /gql-consumer-subscriptions/graphql:
    servers:
      - url: wss://api.rivian.com
    get:
      tags: [Vehicle Info]
      operationId: vehicleSubscriptions
      summary: WebSocket subscriptions
      description: |
        WebSocket endpoint for real-time vehicle data subscriptions.
        Uses the `graphql-ws` protocol. Connect, send `connection_init` with auth payload,
        then subscribe to one or more topics.

        **Available subscriptions:**
        - `tirePressureState` - Tire pressure data
        - `vehicleDepartureSchedules` - Departure schedule changes
        - `vehicleCloudConnection` - Cloud connection status
        - `vehicleState` - Full vehicle state updates

        **Connection init payload:**
        ```json
        {
          "type": "connection_init",
          "payload": {
            "dc-cid": "<device-correlation-id>",
            "u-sess": "<user-session-token>",
            "client-name": "com.rivian.android.consumer",
            "client-version": "2.6.1-2065"
          }
        }
        ```
      parameters:
        - name: a-sess
          in: header
          required: true
          schema:
            type: string
        - name: u-sess
          in: header
          required: true
          schema:
            type: string
        - name: csrf-token
          in: header
          required: true
          schema:
            type: string
      responses:
        "101":
          description: WebSocket upgrade successful

