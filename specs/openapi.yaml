  /gateway/graphql#EnrollPhone:
    post:
      tags: [Vehicle Controls]
      operationId: enrollPhone
      summary: Enroll a phone key
      description: |
        Registers a phone as a key for the vehicle. Requires generating an ECDH key pair
        using the secp256r1 curve and sending the public key. Up to 2 phones can be enrolled.
      security:
        - sessionAuth: []
          userSessionAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                operationName:
                  type: string
                  example: EnrollPhone
                variables:
                  type: object
                  required: [attrs]
                  properties:
                    attrs:
                      type: object
                      required: [userId, vehicleId, publicKey, type, name]
                      properties:
                        userId:
                          type: string
                        vehicleId:
                          type: string
                        publicKey:
                          type: string
                          description: PEM-encoded ECDH public key (secp256r1)
                        type:
                          type: string
                          description: Phone model
                        name:
                          type: string
                          description: Phone name
                query:
                  type: string
      responses:
        "200":
          description: Phone enrolled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      enrollPhone:
                        type: object
                        properties:
                          __typename:
                            type: string
                          success:
                            type: boolean

