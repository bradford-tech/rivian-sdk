  /gateway/graphql#sendVehicleCommand:
    post:
      tags: [Vehicle Controls]
      operationId: sendVehicleCommand
      summary: Send a vehicle command
      description: |
        Sends a command to the vehicle. Requires an HMAC signature computed from the
        command name and timestamp using your phone key's private key.
      security:
        - sessionAuth: []
          userSessionAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                operationName:
                  type: string
                  example: sendVehicleCommand
                variables:
                  type: object
                  required: [attrs]
                  properties:
                    attrs:
                      type: object
                      required:
                        [
                          command,
                          hmac,
                          timestamp,
                          vasPhoneId,
                          deviceId,
                          vehicleId,
                        ]
                      properties:
                        command:
                          $ref: "#/components/schemas/VehicleCommand"
                        hmac:
                          type: string
                          description: HMAC-SHA256 of "{command}{timestamp}" using phone private key
                        timestamp:
                          type: integer
                          description: Unix timestamp
                        vasPhoneId:
                          type: string
                        deviceId:
                          type: string
                        vehicleId:
                          type: string
                query:
                  type: string
      responses:
        "200":
          description: Command sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      sendVehicleCommand:
                        type: object
                        properties:
                          __typename:
                            type: string
                          id:
                            type: string
                          command:
                            type: string
                          state:
                            type: integer

