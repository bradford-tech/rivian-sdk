              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      orders:
                        type: object
                        properties:
                          data:
                            type: array
                            items:
                              $ref: "#/components/schemas/OrderSnapshot"

  /gateway/graphql#delivery:
    post:
      tags: [Account]
      operationId: delivery
