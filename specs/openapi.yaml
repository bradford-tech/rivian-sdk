  # ── Configurator ────────────────────────────────────────────
  /rivian-main/c_fill,w_1920/c_crop,h_1100,g_south,y_178/compositor/{vehicle}/{view}/{options}:
    servers:
      - url: https://media.rivian.com
    get:
      tags: [Configurator]
      operationId: getConfiguratorImage
      summary: Get configurator image
      description: |
        Generates a rendered image of a vehicle configuration. No authentication required.

        **Option codes:**
        - Package: PKG-LCH, PKG-ADV, PKG-EXP, PKG-ASC
        - Paint: EXP-LSV, EXP-GWT, EXP-CRD, EXP-MDN, EXP-RBL, EXP-LST, EXP-FGR, EXP-LGR, EXP-ELG, EXP-CYL, EXP-SBL
        - Wheels: WHL-0A1, WHL-0AD, WHL-0A2, WHL-1RD, WHL-2SS, WHL-2SD, WHL-2AR, WHL-0BS, WHL-2SP, WHL-2SB, WHL-0DD
        - Interior: INT-BMP, INT-GYP, INT-GRP
        - Battery: BAT-C01, BAT-B01, BAT-A01
        - Motor: MOT-201, MOT-301, MOT-401
        - Trim: ACTBDG-BRT, ACTBDG-DRK
        - Generation: GEN-1, GEN-2
      parameters:
        - name: vehicle
          in: path
          required: true
          schema:
            type: string
            enum: [r1t, r1s]
        - name: view
          in: path
          required: true
          schema:
            type: string
            enum: [front, rear, side, driver, backseats, studio]
        - name: options
          in: path
          required: true
          description: "Comma-separated version and option codes (e.g. 2023.1,actbdg-brt,bat-c01,exp-lsv,gen-2,mot-201,pkg-adv,whl-2ss,studio)"
          schema:
            type: string
      responses:
        "200":
          description: Vehicle configuration image
          content:
            image/webp:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
