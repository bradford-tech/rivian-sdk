openapi: 3.1.0
info:
  title: Unofficial Rivian API
  description: |
    Unofficial documentation of the Rivian API used by the Rivian mobile app.
    **WARNING:** This information is not maintained by Rivian and things could change or break at any moment.
    Most Rivian web APIs use GraphQL.
  version: 1.0.0
  contact:
    url: https://rivian-api.kaedenb.org

servers:
  - url: https://rivian.com/api/gql
    description: Rivian GraphQL API
  - url: https://media.rivian.com
    description: Rivian Configurator Media API
  - url: wss://api.rivian.com
    description: Rivian WebSocket API (Subscriptions)

tags:
  - name: Authentication
    description: CSRF token and login endpoints
  - name: Account
    description: Account and order information
  - name: Charging
    description: Charging sessions and wallbox management
  - name: Vehicle Controls
    description: Lock, unlock, and send commands to the vehicle
  - name: Vehicle Info
    description: Vehicle state, images, OTA updates
  - name: Trip Planning
    description: Plan and save trips
  - name: Gear Shop
    description: Product search and pricing
  - name: Configurator
    description: Vehicle configuration image generation

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: header
      name: a-sess
      description: App session token
    userSessionAuth:
      type: apiKey
      in: header
      name: u-sess
      description: User session token
    csrfToken:
      type: apiKey
      in: header
      name: csrf-token
      description: CSRF token

  schemas:
    GraphQLRequest:
      type: object
      required:
        - operationName
        - query
      properties:
        operationName:
          type: string
        variables:
          type: object
        query:
          type: string

    GraphQLResponse:
      type: object
      properties:
        data:
          type: object
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string

    CreateCSRFTokenResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            createCsrfToken:
              type: object
              properties:
                __typename:
                  type: string
                  example: CreateCsrfTokenResponse
                csrfToken:
                  type: string
                appSessionToken:
                  type: string

    LoginResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            loginWithOTP:
              type: object
              properties:
                __typename:
                  type: string
                  example: MobileLoginResponse
                accessToken:
                  type: string
                refreshToken:
                  type: string
                userSessionToken:
                  type: string

    MFALoginResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            login:
              type: object
              properties:
                __typename:
                  type: string
                  example: MobileMFALoginResponse
                otpToken:
                  type: string

    UserInfo:
      type: object
      properties:
        __typename:
          type: string
          example: User
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        address:
          oneOf:
            - $ref: "#/components/schemas/UserAddress"
            - type: "null"
        vehicles:
          type: array
          items:
            $ref: "#/components/schemas/UserVehicle"
        enrolledPhones:
          type: array
          items:
            $ref: "#/components/schemas/EnrolledPhone"
        pendingInvites:
          type: array
          items:
            $ref: "#/components/schemas/PendingInvite"

    UserAddress:
      type: object
      properties:
        __typename:
          type: string
        id:
          type: string
        types:
          type: array
          items:
            type: string
            enum: [PRIMARY, SHIPPING]
        line1:
          type: string
        line2:
          type: [string, "null"]
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string

    UserVehicle:
      type: object
      properties:
        __typename:
          type: string
          example: UserVehicle
        id:
          type: string
        name:
          type: [string, "null"]
        owner:
          type: [string, "null"]
        roles:
          type: array
          items:
            type: string
        vin:
          type: string
        vas:
          type: object
          properties:
            vasVehicleId:
              type: string
            vehiclePublicKey:
              type: string
        vehicle:
          $ref: "#/components/schemas/VehicleDetails"
        settings:
          type: object
          properties:
            name:
              oneOf:
                - type: object
                  properties:
                    value:
                      type: [string, "null"]
                - type: "null"

    VehicleDetails:
      type: object
      properties:
        __typename:
          type: string
        model:
          type: string
          enum: [R1T, R1S]
        modelYear:
          type: integer
        mobileConfiguration:
          $ref: "#/components/schemas/MobileConfiguration"
        deviceSlots:
          type: object
          properties:
            phone:
              type: object
              properties:
                max:
                  type: integer
                free:
                  type: integer
        cccCapable:
          type: boolean
        cccReady:
          type: boolean
        cccEnabled:
          type: boolean
        legacyEnabled:
          type: boolean
        otaEarlyAccessStatus:
          type: boolean
        vehicleState:
          $ref: "#/components/schemas/VehicleState"
        maintenanceSchedule:
          $ref: "#/components/schemas/MaintenanceSchedule"

    MobileConfiguration:
      type: object
      properties:
        __typename:
          type: string
        trimOption:
          $ref: "#/components/schemas/ConfigOption"
        exteriorColorOption:
          $ref: "#/components/schemas/ConfigOption"
        interiorColorOption:
          $ref: "#/components/schemas/ConfigOption"
        driveSystemOption:
          $ref: "#/components/schemas/ConfigOption"
        tonneauOption:
          oneOf:
            - $ref: "#/components/schemas/ConfigOption"
            - type: "null"
        wheelOption:
          $ref: "#/components/schemas/ConfigOption"
        driveSystemDriveModes:
          type: array
          items:
            type: string
        driveSystemTowingDriveModes:
          type: array
          items:
            type: string
        maxVehiclePower:
          type: number
        chargePort:
          type: string
          enum: [CCS, J1772]

    ConfigOption:
      type: object
      properties:
        __typename:
          type: string
        optionId:
          type: string
        optionName:
          type: string

    MaintenanceSchedule:
      type: object
      properties:
        sections:
          type: array
          items:
            type: object
            properties:
              items:
                type: array
                items:
                  type: object
                  properties:
                    description:
                      type: string
                    isDue:
                      type: [boolean, "null"]
              serviceLifetime:
                oneOf:
                  - type: object
                    properties:
                      __typename:
                        type: string
                        example: MaintenanceDistanceLimit
                      km:
                        type: integer
                      mi:
                        type: integer
                  - type: object
                    properties:
                      __typename:
                        type: string
                        example: MaintenanceDateLimit
                      year:
                        type: integer

    EnrolledPhone:
      type: object
      properties:
        vas:
          type: object
          properties:
            vasPhoneId:
              type: string
            publicKey:
              type: string
        enrolled:
          type: array
          items:
            type: object
            properties:
              deviceType:
                type: string
              deviceName:
                type: string
              vehicleId:
                type: string
              identityId:
                type: string
              shortName:
                type: string

    PendingInvite:
      type: object
      properties:
        id:
          type: string
        invitedByFirstName:
          type: string
        role:
          type: string
        status:
          type: string
        vehicleId:
          type: string
        vehicleModel:
          type: string
        email:
          type: string

    VehicleState:
      type: object
      properties:
        __typename:
          type: string
          example: VehicleState
        gnssLocation:
          type: [object, "null"]
          properties:
            latitude:
              type: number
            longitude:
              type: number
            timeStamp:
              type: string
              format: date-time
            isAuthorized:
              type: boolean
        gnssSpeed:
          $ref: "#/components/schemas/TimestampedValue"
        gnssAltitude:
          $ref: "#/components/schemas/TimestampedValue"
        gnssError:
          type: [object, "null"]
          properties:
            timeStamp:
              type: string
              format: date-time
            positionVertical:
              type: number
            positionHorizontal:
              type: number
            speed:
              type: number
            bearing:
              type: number
        alarmSoundStatus:
          $ref: "#/components/schemas/TimestampedValue"
        timeToEndOfCharge:
          $ref: "#/components/schemas/TimestampedValue"
        doorFrontLeftLocked:
          $ref: "#/components/schemas/TimestampedValue"
        doorFrontLeftClosed:
          $ref: "#/components/schemas/TimestampedValue"
        doorFrontRightLocked:
          $ref: "#/components/schemas/TimestampedValue"
        doorFrontRightClosed:
          $ref: "#/components/schemas/TimestampedValue"
        doorRearLeftLocked:
          $ref: "#/components/schemas/TimestampedValue"
        doorRearLeftClosed:
          $ref: "#/components/schemas/TimestampedValue"
        doorRearRightLocked:
          $ref: "#/components/schemas/TimestampedValue"
        doorRearRightClosed:
          $ref: "#/components/schemas/TimestampedValue"
        windowFrontLeftClosed:
          $ref: "#/components/schemas/TimestampedValue"
        windowFrontRightClosed:
          $ref: "#/components/schemas/TimestampedValue"
        windowFrontLeftCalibrated:
          $ref: "#/components/schemas/TimestampedValue"
        windowFrontRightCalibrated:
          $ref: "#/components/schemas/TimestampedValue"
        windowRearLeftCalibrated:
          $ref: "#/components/schemas/TimestampedValue"
        windowRearRightCalibrated:
          $ref: "#/components/schemas/TimestampedValue"
        windowRearLeftClosed:
          $ref: "#/components/schemas/TimestampedValue"
        windowRearRightClosed:
          $ref: "#/components/schemas/TimestampedValue"
        closureFrunkLocked:
          $ref: "#/components/schemas/TimestampedValue"
        closureFrunkClosed:
          $ref: "#/components/schemas/TimestampedValue"
        closureFrunkNextAction:
          $ref: "#/components/schemas/TimestampedValue"
        closureLiftgateLocked:
          $ref: "#/components/schemas/TimestampedValue"
        closureLiftgateClosed:
          $ref: "#/components/schemas/TimestampedValue"
        closureLiftgateNextAction:
          $ref: "#/components/schemas/TimestampedValue"
        closureSideBinLeftLocked:
          $ref: "#/components/schemas/TimestampedValue"
        closureSideBinLeftClosed:
          $ref: "#/components/schemas/TimestampedValue"
        closureSideBinRightLocked:
          $ref: "#/components/schemas/TimestampedValue"
        closureSideBinLeftNextAction:
          $ref: "#/components/schemas/TimestampedValue"
        closureSideBinRightClosed:
          $ref: "#/components/schemas/TimestampedValue"
        closureSideBinRightNextAction:
          $ref: "#/components/schemas/TimestampedValue"
        closureTailgateLocked:
          $ref: "#/components/schemas/TimestampedValue"
        closureTailgateClosed:
          $ref: "#/components/schemas/TimestampedValue"
        closureTailgateNextAction:
          $ref: "#/components/schemas/TimestampedValue"
        closureTonneauLocked:
          $ref: "#/components/schemas/TimestampedValue"
        closureTonneauClosed:
          $ref: "#/components/schemas/TimestampedValue"
        gearGuardLocked:
          $ref: "#/components/schemas/TimestampedValue"
        wiperFluidState:
          $ref: "#/components/schemas/TimestampedValue"
        powerState:
          $ref: "#/components/schemas/TimestampedValue"
        batteryHvThermalEventPropagation:
          $ref: "#/components/schemas/TimestampedValue"
        twelveVoltBatteryHealth:
          $ref: "#/components/schemas/TimestampedValue"
        vehicleMileage:
          $ref: "#/components/schemas/TimestampedValue"
        brakeFluidLow:
          $ref: "#/components/schemas/TimestampedValue"
        gearStatus:
          $ref: "#/components/schemas/TimestampedValue"
        tirePressureStatusFrontLeft:
          $ref: "#/components/schemas/TimestampedValue"
        tirePressureStatusValidFrontLeft:
          $ref: "#/components/schemas/TimestampedValue"
        tirePressureStatusFrontRight:
          $ref: "#/components/schemas/TimestampedValue"
        tirePressureStatusValidFrontRight:
          $ref: "#/components/schemas/TimestampedValue"
        tirePressureStatusRearLeft:
          $ref: "#/components/schemas/TimestampedValue"
        tirePressureStatusValidRearLeft:
          $ref: "#/components/schemas/TimestampedValue"
        tirePressureStatusRearRight:
          $ref: "#/components/schemas/TimestampedValue"
        tirePressureStatusValidRearRight:
          $ref: "#/components/schemas/TimestampedValue"
        batteryLevel:
          $ref: "#/components/schemas/TimestampedValue"
        chargerState:
          $ref: "#/components/schemas/TimestampedValue"
        batteryLimit:
          $ref: "#/components/schemas/TimestampedValue"
        remoteChargingAvailable:
          $ref: "#/components/schemas/TimestampedValue"
        batteryHvThermalEvent:
          $ref: "#/components/schemas/TimestampedValue"
        rangeThreshold:
          $ref: "#/components/schemas/TimestampedValue"
        distanceToEmpty:
          $ref: "#/components/schemas/TimestampedValue"
        otaAvailableVersion:
          $ref: "#/components/schemas/TimestampedValue"
        otaAvailableVersionGitHash:
          $ref: "#/components/schemas/TimestampedValue"
        otaAvailableVersionNumber:
          $ref: "#/components/schemas/TimestampedValue"
        otaAvailableVersionWeek:
          $ref: "#/components/schemas/TimestampedValue"
        otaAvailableVersionYear:
          $ref: "#/components/schemas/TimestampedValue"
        otaCurrentVersion:
          $ref: "#/components/schemas/TimestampedValue"
        otaCurrentVersionGitHash:
          $ref: "#/components/schemas/TimestampedValue"
        otaCurrentVersionNumber:
          $ref: "#/components/schemas/TimestampedValue"
        otaCurrentVersionWeek:
          $ref: "#/components/schemas/TimestampedValue"
        otaCurrentVersionYear:
          $ref: "#/components/schemas/TimestampedValue"
        otaDownloadProgress:
          $ref: "#/components/schemas/TimestampedValue"
        otaInstallDuration:
          $ref: "#/components/schemas/TimestampedValue"
        otaInstallProgress:
          $ref: "#/components/schemas/TimestampedValue"
        otaInstallReady:
          $ref: "#/components/schemas/TimestampedValue"
        otaInstallTime:
          $ref: "#/components/schemas/TimestampedValue"
        otaInstallType:
          $ref: "#/components/schemas/TimestampedValue"
        otaStatus:
          $ref: "#/components/schemas/TimestampedValue"
        otaCurrentStatus:
          $ref: "#/components/schemas/TimestampedValue"
        cabinClimateInteriorTemperature:
          $ref: "#/components/schemas/TimestampedValue"
        cabinPreconditioningStatus:
          $ref: "#/components/schemas/TimestampedValue"
        cabinPreconditioningType:
          $ref: "#/components/schemas/TimestampedValue"
        petModeStatus:
          $ref: "#/components/schemas/TimestampedValue"
        petModeTemperatureStatus:
          $ref: "#/components/schemas/TimestampedValue"
        cabinClimateDriverTemperature:
          $ref: "#/components/schemas/TimestampedValue"
        gearGuardVideoStatus:
          $ref: "#/components/schemas/TimestampedValue"
        gearGuardVideoMode:
          $ref: "#/components/schemas/TimestampedValue"
        gearGuardVideoTermsAccepted:
          $ref: "#/components/schemas/TimestampedValue"
        defrostDefogStatus:
          $ref: "#/components/schemas/TimestampedValue"
        steeringWheelHeat:
          $ref: "#/components/schemas/TimestampedValue"
        seatFrontLeftHeat:
          $ref: "#/components/schemas/TimestampedValue"
        seatFrontRightHeat:
          $ref: "#/components/schemas/TimestampedValue"
        seatRearLeftHeat:
          $ref: "#/components/schemas/TimestampedValue"
        seatRearRightHeat:
          $ref: "#/components/schemas/TimestampedValue"
        chargerStatus:
          $ref: "#/components/schemas/TimestampedValue"
        seatFrontLeftVent:
          $ref: "#/components/schemas/TimestampedValue"
        seatFrontRightVent:
          $ref: "#/components/schemas/TimestampedValue"
        chargerDerateStatus:
          $ref: "#/components/schemas/TimestampedValue"
        driveMode:
          $ref: "#/components/schemas/TimestampedValue"
        serviceMode:
          $ref: "#/components/schemas/TimestampedValue"
        trailerStatus:
          $ref: "#/components/schemas/TimestampedValue"
        carWashMode:
          $ref: "#/components/schemas/TimestampedValue"
        chargePortState:
          $ref: "#/components/schemas/TimestampedValue"
        windowsNextAction:
          $ref: "#/components/schemas/TimestampedValue"
        btmFfHardwareFailureStatus:
          $ref: "#/components/schemas/TimestampedValue"
        btmIcHardwareFailureStatus:
          $ref: "#/components/schemas/TimestampedValue"
        btmLfdHardwareFailureStatus:
          $ref: "#/components/schemas/TimestampedValue"
        btmRfHardwareFailureStatus:
          $ref: "#/components/schemas/TimestampedValue"
        btmRfdHardwareFailureStatus:
          $ref: "#/components/schemas/TimestampedValue"
        chargingTimeEstimationValidity:
          $ref: "#/components/schemas/TimestampedValue"
        limitedAccelCold:
          $ref: "#/components/schemas/TimestampedValue"
        limitedRegenCold:
          $ref: "#/components/schemas/TimestampedValue"
        rearHitchStatus:
          $ref: "#/components/schemas/TimestampedValue"
        tirePressureFrontLeft:
          $ref: "#/components/schemas/TimestampedValue"
        tirePressureFrontRight:
          $ref: "#/components/schemas/TimestampedValue"
        tirePressureRearLeft:
          $ref: "#/components/schemas/TimestampedValue"
        tirePressureRearRight:
          $ref: "#/components/schemas/TimestampedValue"
        batteryCapacity:
          $ref: "#/components/schemas/TimestampedValue"
        supportedFeatures:
          type: array
          items:
            $ref: "#/components/schemas/SupportedFeature"

    TimestampedValue:
      type: [object, "null"]
      properties:
        timeStamp:
          type: string
          format: date-time
        value:
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: integer

    SupportedFeature:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [AVAILABLE, UNAVAILABLE]

    TrailerProfile:
      type: [object, "null"]
      properties:
        __typename:
          type: string
          example: TrailerProfile
        rangeStatus:
          type: string
        weight:
          type: number
        onRoadEfficiency:
          type: number
        offRoadEfficiency:
          type: number
        name:
          type: string

    TransactionStep:
      type: object
      properties:
        sourceStatus:
          type: object
          properties:
            status:
              type: string
            details:
              type: [object, "null"]
        consumerStatus:
          type: object
          properties:
            displayOrder:
              type: integer
            current:
              type: boolean
            complete:
              type: boolean
            locked:
              type: boolean
            inProgress:
              type: boolean
            notStarted:
              type: boolean
            error:
              type: boolean

    VehicleCommand:
      type: string
      enum:
        - WAKE_VEHICLE
        - OPEN_FRUNK
        - CLOSE_FRUNK
        - OPEN_ALL_WINDOWS
        - CLOSE_ALL_WINDOWS
        - UNLOCK_ALL_CLOSURES
        - LOCK_ALL_CLOSURES
        - ENABLE_GEAR_GUARD_VIDEO
        - DISABLE_GEAR_GUARD_VIDEO
        - HONK_AND_FLASH_LIGHTS
        - OPEN_TONNEAU_COVER
        - CLOSE_TONNEAU_COVER

    WallboxRecord:
      type: object
      properties:
        __typename:
          type: string
          example: WallboxRecord
        wallboxId:
          type: string
        userId:
          type: string
        wifiId:
          type: string
        name:
          type: string
        linked:
          type: boolean
        latitude:
          type: number
        longitude:
          type: number
        chargingStatus:
          type: string
          enum: [AVAILABLE, CHARGING, DISCONNECTED]
        power:
          type: [number, "null"]
        currentVoltage:
          type: [number, "null"]
        currentAmps:
          type: [number, "null"]
        softwareVersion:
          type: string
        model:
          type: string
        serialNumber:
          type: string
        maxPower:
          type: string
        maxVoltage:
          type: string
        maxAmps:
          type: [string, "null"]

    ChargingSessionSummary:
      type: object
      properties:
        chargerType:
          type: string
        currencyCode:
          type: [string, "null"]
        paidTotal:
          type: [number, "null"]
        startInstant:
          type: string
          format: date-time
        endInstant:
          type: string
          format: date-time
        totalEnergyKwh:
          type: number
        rangeAddedKm:
          type: [number, "null"]
        city:
          type: string
        transactionId:
          type: string
        vehicleId:
          type: [string, "null"]
        vehicleName:
          type: [string, "null"]
        vendor:
          type: string
        isRoamingNetwork:
          type: boolean
        isPublic:
          type: boolean
        isHomeCharger:
          type: boolean
        meta:
          type: object
          properties:
            transactionIdGroupingKey:
              type: string
            dataSources:
              type: array
              items:
                type: string

    LiveSessionData:
      type: object
      properties:
        isRivianCharger:
          type: boolean
        isFreeSession:
          type: boolean
        vehicleChargerState:
          $ref: "#/components/schemas/TimestampedValue"
        chargerId:
          type: string
        startTime:
          type: string
          format: date-time
        timeElapsed:
          type: string
        timeRemaining:
          $ref: "#/components/schemas/TimestampedValue"
        kilometersChargedPerHour:
          $ref: "#/components/schemas/TimestampedValue"
        power:
          $ref: "#/components/schemas/TimestampedValue"
        rangeAddedThisSession:
          $ref: "#/components/schemas/TimestampedValue"
        totalChargedEnergy:
          $ref: "#/components/schemas/TimestampedValue"
        currentPrice:
          type: number

    ChargingSchedule:
      type: object
      properties:
        startTime:
          type: integer
          description: Minutes after midnight to start charging
        duration:
          type: integer
          description: Duration in minutes
        location:
          type: object
          properties:
            latitude:
              type: number
            longitude:
              type: number
        amperage:
          type: integer
        enabled:
          type: boolean
        weekDays:
          type: array
          items:
            type: string
            enum:
              [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]

    ChargerDetails:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        location:
          type: object
          properties:
            addressComponents:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  shortName:
                    type: string
                  longName:
                    type: string
            formattedAddress:
              type: string
            coordinate:
              type: object
              properties:
                latitude:
                  type: number
                longitude:
                  type: number
            navCoordinate:
              type: object
              properties:
                latitude:
                  type: number
                longitude:
                  type: number
        distance:
          type: number
        driveDetails:
          type: [object, "null"]
          properties:
            driveDistance:
              type: number
            driveDuration:
              type: number
            detourDistance:
              type: number
            detourDuration:
              type: number
        chargingStation:
          type: object
          properties:
            network:
              type: string
            networkId:
              type: string
            maxKw:
              type: integer
            note:
              type: string
            chargers:
              type: array
              items:
                type: object
                properties:
                  locationId:
                    type: string
                  pluginDependency:
                    type: string
                  connectors:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        evseId:
                          type: string
                        evseUid:
                          type: string
                        name:
                          type: string
                        level:
                          type: string
                        maxKw:
                          type: integer
                        chargingPrice:
                          type: [object, "null"]
                          properties:
                            level:
                              type: [string, "null"]
                            description:
                              type: [string, "null"]
                            amount:
                              type: [number, "null"]
                            currency:
                              type: [string, "null"]
                            lastUpdateTime:
                              type: [string, "null"]
                            symbol:
                              type: [string, "null"]
                            type:
                              type: [string, "null"]
                            unit:
                              type: [string, "null"]
                        type:
                          type: string
                          enum: [CCS, J1772]
                        free:
                          type: boolean
                        vend:
                          type: [string, "null"]
                        state:
                          type: string
            operatingHours:
              type: object
              properties:
                alwaysOpen:
                  type: boolean
                hours:
                  type: array
                  items:
                    type: object
                    properties:
                      close:
                        type: integer
                      day:
                        type: string
                      open:
                        type: integer
        adapterRequired:
          type: boolean

    Delivery:
      type: object
      properties:
